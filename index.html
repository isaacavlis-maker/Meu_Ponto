<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Timesheet Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --accent: #4f46e5; --bg: #f1f5f9; --text: #1e293b; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        header { background: #1e293b; color: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        .tab-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; border-radius: 10px; border: none; background: #ddd; font-weight: bold; }
        .tab-btn.active { background: var(--accent); color: white; }
        .panel { display: none; } .panel.active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #eee; }
        footer { text-align: center; margin-top: 30px; font-weight: 900; color: var(--text); opacity: 0.6; }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0; font-size: 1.2rem;">Timesheet Pro</h1>
    <div id="data-atual" style="font-size: 0.8rem; opacity: 0.7;"></div>
</header>

<div class="card">
    <label>Language / Idioma</label>
    <select id="lang" onchange="changeLang()">
        <option value="en">English (US)</option>
        <option value="pt">Português (BR)</option>
        <option value="es">Español (ES)</option>
    </select>
</div>

<div class="tab-group">
    <button id="t1" class="tab-btn active" onclick="tab('lancar')">ENTRY</button>
    <button id="t2" class="tab-btn" onclick="tab('resumo')">REPORT</button>
</div>

<div id="p-lancar" class="panel active">
    <div class="card">
        <input type="text" id="nome" placeholder="Your Name / Seu Nome">
        <input type="date" id="data">
        <div style="display: flex; gap: 10px;">
            <input type="time" id="in">
            <input type="time" id="out">
        </div>
        <input type="number" id="rate" placeholder="Hourly Rate (US$)">
        <button onclick="salvar()">SAVE / SALVAR</button>
    </div>
    <div class="card" style="overflow-x: auto;">
        <table id="tabela">
            <thead><tr><th>Date</th><th>Hrs</th><th>Pay</th><th>X</th></tr></thead>
            <tbody id="corpo"></tbody>
        </table>
    </div>
</div>

<div id="p-resumo" class="panel">
    <div class="card">
        <h3 id="txt-total">Month Total:</h3>
        <div id="total-val" style="font-size: 2rem; font-weight: 900; color: var(--accent);">00:00</div>
        <div id="total-money" style="font-size: 1.2rem; color: #10b981; font-weight: bold;">$ 0.00</div>
    </div>
    <button style="background: #10b981;" onclick="exportExcel()">EXCEL</button>
</div>

<footer>
    MADE BY ISAQUE / FEITO POR ISAQUE
</footer>

<script>
    let db = JSON.parse(localStorage.getItem('db_isaque')) || [];

    window.onload = () => {
        document.getElementById('data').value = new Date().toISOString().split('T')[0];
        document.getElementById('data-atual').innerText = new Date().toLocaleDateString();
        document.getElementById('nome').value = localStorage.getItem('user_n') || '';
        document.getElementById('rate').value = localStorage.getItem('user_r') || '';
        render();
    };

    function tab(p) {
        document.querySelectorAll('.panel').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById('p-' + p).classList.add('active');
        if(p === 'lancar') document.getElementById('t1').classList.add('active');
        else { document.getElementById('t2').classList.add('active'); calcResumo(); }
    }

    function salvar() {
        const d = document.getElementById('data').value;
        const i = document.getElementById('in').value;
        const o = document.getElementById('out').value;
        const r = parseFloat(document.getElementById('rate').value) || 0;

        if(!d || !i || !o) return alert("Fill all! / Preencha tudo!");

        const diff = (new Date('2000-01-01T' + o) - new Date('2000-01-01T' + i)) / 1000 / 60;
        if(diff < 0) return alert("Invalid Time!");

        const obj = { id: Date.now(), data: d, min: diff, pay: (diff/60)*r };
        db = db.filter(x => x.data !== d);
        db.push(obj);
        
        localStorage.setItem('db_isaque', JSON.stringify(db));
        localStorage.setItem('user_n', document.getElementById('nome').value);
        localStorage.setItem('user_r', document.getElementById('rate').value);
        
        render();
        alert("Saved! / Salvo!");
    }

    function render() {
        const corpo = document.getElementById('corpo');
        corpo.innerHTML = '';
        db.sort((a,b) => b.data.localeCompare(a.data)).forEach(it => {
            const tr = document.createElement('tr');
            const h = Math.floor(it.min/60);
            const m = it.min%60;
            tr.innerHTML = `<td>${it.data}</td><td>${h}:${m < 10 ? '0'+m : m}</td><td>$${it.pay.toFixed(2)}</td><td><button style="padding:5px; margin:0; background:red;" onclick="remover(${it.id})">X</button></td>`;
            corpo.appendChild(tr);
        });
    }

    function remover(id) {
        db = db.filter(x => x.id !== id);
        localStorage.setItem('db_isaque', JSON.stringify(db));
        render();
    }

    function calcResumo() {
        const totalM = db.reduce((a, b) => a + b.min, 0);
        const total$ = db.reduce((a, b) => a + b.pay, 0);
        document.getElementById('total-val').innerText = Math.floor(totalM/60) + ":" + (totalM%60 < 10 ? '0'+totalM%60 : totalM%60);
        document.getElementById('total-money').innerText = "US$ " + total$.toFixed(2);
    }

    function exportExcel() {
        const ws = XLSX.utils.json_to_sheet(db);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Ponto");
        XLSX.writeFile(wb, "Timesheet_Isaque.xlsx");
    }
</script>

</body>
</html>
