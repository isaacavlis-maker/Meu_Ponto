<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ponto Pro Isaque</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { --p: #4f46e5; --ot: #f59e0b; --bg: #0f172a; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, sans-serif; }
        
        /* Splash Screen */
        #splash { position:fixed; top:0; left:0; width:100%; height:100%; background:#0f172a; display:flex; align-items:center; justify-content:center; z-index:9999; color:white; flex-direction:column; }
        .c-splash { background:rgba(255,255,255,0.1); padding:30px; border-radius:20px; text-align:center; width:85%; max-width:350px; }
        
        /* Body principal SEM o display:none para evitar tela branca */
        body { background:#f1f5f9; padding:15px; }
        #app-content { display:none; }

        header { background:#1e293b; color:white; padding:15px; border-radius:15px; margin-bottom:15px; display:flex; justify-content:space-between; }
        .card { background:white; border-radius:15px; padding:15px; box-shadow:0 2px 5px rgba(0,0,0,0.05); margin-bottom:10px; }
        .grid { display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
        input, select { width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; margin-top:5px; font-size:16px; }
        button { background:var(--p); color:white; border:none; padding:12px; border-radius:10px; width:100%; font-weight:bold; margin-top:10px; cursor:pointer; }
        .tabs { display:flex; gap:5px; margin-bottom:10px; }
        .t-btn { flex:1; padding:10px; border:none; border-radius:10px; background:#cbd5e1; font-weight:bold; }
        .t-btn.active { background:var(--p); color:white; }
        .panel { display:none; } .panel.active { display:block; }
        table { width:100%; border-collapse:collapse; font-size:12px; margin-top:10px; }
        th, td { padding:8px; border-bottom:1px solid #eee; text-align:left; }
    </style>
</head>
<body>

<div id="splash">
    <div class="c-splash">
        <img src="icon.png" style="width:70px; border-radius:15px; margin-bottom:10px;" onerror="this.style.display='none'">
        <h2 style="margin-bottom:15px;">Timesheet Pro</h2>
        <select id="langSet" style="margin-bottom:15px; color: black;">
            <option value="en">English (US)</option>
            <option value="pt">Português (BR)</option>
            <option value="es">Español (ES)</option>
        </select>
        <button onclick="iniciar()">START / INICIAR</button>
    </div>
</div>

<div id="app-content">
    <header>
        <div><b id="txt-h">Time Tracker</b><br><small>ISAQUE EDITION</small></div>
        <div id="clock">00:00</div>
    </header>

    <div class="card">
        <div class="grid">
            <input type="text" id="uN" placeholder="Name">
            <input type="text" id="uC" placeholder="Company">
        </div>
        <input type="number" id="uR" placeholder="Rate US$" style="margin-top:10px;">
    </div>

    <div class="tabs">
        <button id="b1" class="t-btn active" onclick="ver('lancar')">ENTRY</button>
        <button id="b2" class="t-btn" onclick="ver('resumo')">REPORT</button>
    </div>

    <div id="p-lancar" class="panel active">
        <div class="card">
            <input type="date" id="data">
            <div class="grid" style="margin-top:10px;">
                <div><label>IN</label><input type="time" id="t1"></div>
                <div><label>OUT</label><input type="time" id="t2"></div>
                <div><label>LUNCH IN</label><input type="time" id="l1"></div>
                <div><label>LUNCH OUT</label><input type="time" id="l2"></div>
            </div>
            <button onclick="salvar()" id="txt-btn">SAVE</button>
        </div>
        <div class="card" style="overflow-x:auto;">
            <table>
                <thead><tr><th>Date</th><th>Total</th><th>Pay</th><th></th></tr></thead>
                <tbody id="lista"></tbody>
            </table>
        </div>
    </div>

    <div id="p-resumo" class="panel">
        <div class="card">
            <p id="txt-m">MONTH TOTAL</p>
            <h2 id="vTotal">00:00</h2>
        </div>
        <div class="card" style="border-left:5px solid #10b981;">
            <p id="txt-p">EARNINGS</p>
            <h2 id="vPay" style="color:green;">$ 0.00</h2>
        </div>
        <div class="grid">
            <button style="background:#10b981;" onclick="exportar()">EXCEL</button>
            <button style="background:#ef4444;" onclick="pdf()">PDF</button>
        </div>
    </div>
    
    <p style="text-align:center; font-size:10px; margin-top:20px; color:#64748b;">MADE BY ISAQUE</p>
</div>

<script>
    let dados = JSON.parse(localStorage.getItem('ponto_isq_v9')) || [];
    let idioma = 'en';

    const trad = {
        en: { h: "Time Tracker", b: "SAVE", t1: "ENTRY", t2: "REPORT", m: "MONTH TOTAL", p: "EARNINGS" },
        pt: { h: "Controle de Ponto", b: "SALVAR", t1: "LANÇAR", t2: "RESUMO", m: "TOTAL DO MÊS", p: "GANHOS" },
        es: { h: "Control de Horas", b: "GUARDAR", t1: "REGISTRO", t2: "REPORTE", m: "TOTAL MES", p: "PAGO" }
    };

    function iniciar() {
        idioma = document.getElementById('langSet').value;
        const t = trad[idioma];
        document.getElementById('txt-h').innerText = t.h;
        document.getElementById('txt-btn').innerText = t.b;
        document.getElementById('b1').innerText = t.t1;
        document.getElementById('b2').innerText = t.t2;
        document.getElementById('txt-m').innerText = t.m;
        document.getElementById('txt-p').innerText = t.p;
        
        document.getElementById('splash').style.display = 'none';
        document.getElementById('app-content').style.display = 'block';
        desenhar();
    }

    function ver(p) {
        document.querySelectorAll('.panel, .t-btn').forEach(el => el.classList.remove('active'));
        document.getElementById('p-'+p).classList.add('active');
        document.getElementById(p === 'lancar' ? 'b1' : 'b2').classList.add('active');
        if(p === 'resumo') {
            let minutos = dados.reduce((a,b)=> a + b.m, 0);
            let grana = dados.reduce((a,b)=> a + b.g, 0);
            document.getElementById('vTotal').innerText = Math.floor(minutos/60) + "h " + (minutos%60) + "m";
            document.getElementById('vPay').innerText = "US$ " + grana.toFixed(2);
        }
    }

    function salvar() {
        const d = document.getElementById('data').value, r = parseFloat(document.getElementById('uR').value) || 0;
        const i = document.getElementById('t1').value, o = document.getElementById('t2').value;
        const l1 = document.getElementById('l1').value, l2 = document.getElementById('l2').value;

        if(!d || !i || !o) return alert("Error!");
        const m = (t) => { const [h,min] = t.split(':'); return parseInt(h)*60 + parseInt(min); };
        let total = m(o) - m(i);
        if(l1 && l2) total -= (m(l2) - m(l1));

        let obj = { id: Date.now(), d, m: total, g: (total/60)*r };
        dados = dados.filter(x => x.d !== d); dados.push(obj);
        localStorage.setItem('ponto_isq_v9', JSON.stringify(dados));
        localStorage.setItem('isq_n', document.getElementById('uN').value);
        localStorage.setItem('isq_c', document.getElementById('uC').value);
        localStorage.setItem('isq_r', r);
        desenhar(); alert("Saved!");
    }

    function desenhar() {
        let html = '';
        dados.sort((a,b)=>b.d.localeCompare(a.d)).forEach(x => {
            html += `<tr><td>${x.d}</td><td>${Math.floor(x.m/60)}h</td><td>$${x.g.toFixed(2)}</td><td><button onclick="apagar(${x.id})" style="background:none; color:red; margin:0; width:auto;">X</button></td></tr>`;
        });
        document.getElementById('lista').innerHTML = html;
    }

    function apagar(id) { dados = dados.filter(x=>x.id!==id); localStorage.setItem('ponto_isq_v9', JSON.stringify(dados)); desenhar(); }

    function exportar() {
        const ws = XLSX.utils.json_to_sheet(dados);
        const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Ponto");
        XLSX.writeFile(wb, "Ponto.xlsx");
    }

    function pdf() {
        const { jsPDF } = window.jspdf; let doc = new jsPDF();
        doc.text("Report - Isaque", 10, 10);
        doc.autoTable({ head: [['Date', 'Min', 'Pay']], body: dados.map(x=>[x.d, x.m, x.g.toFixed(2)]) });
        doc.save("Report.pdf");
    }

    window.onload = () => {
        document.getElementById('data').value = new Date().toISOString().split('T')[0];
        document.getElementById('uN').value = localStorage.getItem('isq_n') || '';
        document.getElementById('uC').value = localStorage.getItem('isq_c') || '';
        document.getElementById('uR').value = localStorage.getItem('isq_r') || 0;
        setInterval(()=> { document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }, 1000);
    };
</script>
</body>
</html>
