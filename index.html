<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Timesheet Pro Isaque Platinum V11</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { --p: #4f46e5; --ot: #f59e0b; --bg: #0f172a; --text: #1e293b; --success: #10b981; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, system-ui, sans-serif; }
        
        #splash { position:fixed; top:0; left:0; width:100%; height:100%; background:linear-gradient(135deg, #0f172a, #1e293b); display:flex; align-items:center; justify-content:center; z-index:9999; color:white; flex-direction:column; transition: 0.5s; }
        .c-splash { background:rgba(255,255,255,0.05); backdrop-filter: blur(10px); padding:40px; border-radius:30px; text-align:center; width:85%; max-width:400px; border: 1px solid rgba(255,255,255,0.1); }
        
        body { background:#f1f5f9; color: var(--text); padding-bottom: 50px; }
        #app-content { display:none; padding: 15px; }

        header { background:#1e293b; color:white; padding:25px; border-radius:20px; margin-bottom:20px; display:flex; justify-content:space-between; align-items: center; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .card { background:white; border-radius:20px; padding:20px; box-shadow:0 4px 6px rgba(0,0,0,0.05); margin-bottom:15px; border: 1px solid #e2e8f0; }
        .card-title { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: #64748b; margin-bottom: 15px; display: block; }

        .grid { display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
        .full { grid-column: span 2; }

        label { font-size: 0.65rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px; display: block; }
        input, select { width:100%; padding:12px; border:2px solid #f1f5f9; border-radius:12px; background:#f8fafc; font-size:1rem; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--p); background: white; }

        .tabs { display:flex; gap:8px; background:#e2e8f0; padding:5px; border-radius:15px; margin-bottom:20px; }
        .t-btn { flex:1; padding:12px; border:none; border-radius:10px; background:transparent; font-weight:bold; color: #64748b; cursor:pointer; }
        .t-btn.active { background:white; color:var(--p); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        .panel { display:none; } .panel.active { display:block; }

        button.btn-main { background:var(--p); color:white; border:none; padding:15px; border-radius:12px; width:100%; font-weight:bold; cursor:pointer; transition: 0.2s; }
        button.btn-main:active { transform: scale(0.98); }

        .kpi-box { padding: 20px; border-radius: 15px; border-left: 5px solid var(--p); background: #f8fafc; }
        .val { font-size: 1.8rem; font-weight: 900; margin-top: 5px; }

        table { width:100%; border-collapse:collapse; margin-top:10px; }
        th { text-align:left; padding:12px; font-size:0.65rem; color:#94a3b8; text-transform:uppercase; border-bottom: 2px solid #f1f5f9; }
        td { padding:12px; border-bottom: 1px solid #f1f5f9; font-size:0.85rem; }

        footer { text-align:center; margin-top:40px; border-top: 1px solid #e2e8f0; padding-top: 20px; }
        .isaque-sig { font-weight: 900; color: var(--bg); letter-spacing: 1px; text-transform: uppercase; font-size: 0.8rem; }
    </style>
</head>
<body>

<div id="splash">
    <div class="c-splash">
        <img id="splash-icon" src="icon.png" style="width:90px; border-radius:20px; margin-bottom:20px; box-shadow: 0 10px 20px rgba(0,0,0,0.3);" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2088/2088617.png'">
        <h2 style="margin-bottom:10px;">Timesheet Pro</h2>
        <p style="font-size:0.8rem; opacity:0.7; margin-bottom:20px;">Select Language / Selecione o Idioma</p>
        <select id="langSet" style="margin-bottom:20px; color: black;">
            <option value="en">English (US)</option>
            <option value="pt">Português (BR)</option>
            <option value="es">Español (ES)</option>
        </select>
        <button class="btn-main" onclick="iniciarApp()">START / INICIAR</button>
    </div>
</div>

<div id="app-content">
    <header>
        <div><b id="txt-h" style="font-size: 1.2rem;">Time Tracker</b><br><small id="txt-sub">ISaque edition</small></div>
        <div id="clock" style="font-weight: 900; font-size: 1.1rem;">00:00</div>
    </header>

    <div class="card">
        <span class="card-title" id="t-profile">Profile & Company</span>
        <div class="grid">
            <div class="full"><label id="l-name">Name</label><input type="text" id="uN" class="nav-in" placeholder="Your Name"></div>
            <div><label id="l-comp">Company</label><input type="text" id="uC" class="nav-in" placeholder="Company Name"></div>
            <div><label id="l-rate">Rate (US$)</label><input type="number" id="uR" class="nav-in" placeholder="0.00"></div>
        </div>
    </div>

    <nav class="tabs">
        <button id="b1" class="t-btn active" onclick="show('lancar')">ENTRY</button>
        <button id="b2" class="t-btn" onclick="show('resumo')">REPORT</button>
    </nav>

    <div id="p-lancar" class="panel active">
        <div class="card">
            <span class="card-title" id="t-new">New Shift</span>
            <div class="grid">
                <div class="full"><label id="l-date">Date</label><input type="date" id="data" class="nav-in"></div>
                <div><label>IN</label><input type="time" id="t1" class="nav-in"></div>
                <div><label>OUT</label><input type="time" id="t2" class="nav-in"></div>
                <div><label>LUNCH IN</label><input type="time" id="l1" class="nav-in"></div>
                <div><label>LUNCH OUT</label><input type="time" id="l2" class="nav-in"></div>
            </div>
            <button class="btn-main" style="margin-top:20px;" onclick="salvarPonto()" id="txt-btn">SAVE ENTRY</button>
        </div>

        <div class="card" style="overflow-x:auto;">
            <table>
                <thead><tr><th id="th1">Date</th><th id="th2">Total</th><th id="th3">Pay</th><th></th></tr></thead>
                <tbody id="listaPonto"></tbody>
            </table>
        </div>
    </div>

    <div id="p-resumo" class="panel">
        <div class="grid">
            <div class="kpi-box"><label id="txt-mt">Month Total</label><div id="vTotal" class="val">00:00</div></div>
            <div class="kpi-box" style="border-left-color: var(--ot);"><label id="txt-ot">Overtime</label><div id="vOT" class="val" style="color:var(--ot)">00:00</div></div>
        </div>
        <div class="card" style="margin-top:15px; border-left: 5px solid var(--success);">
            <label id="txt-earn">Total Earnings</label>
            <div id="vPay" class="val" style="color:var(--success)">$ 0.00</div>
        </div>
        <div class="grid">
            <button class="btn-main" style="background:#10b981;" onclick="exportarExcel()">📊 EXCEL</button>
            <button class="btn-main" style="background:#ef4444;" onclick="exportarPDF()">📄 PDF INVOICE</button>
        </div>
    </div>
    
    <footer>
        <p class="isaque-sig">Made by Isaque / Feito por Isaque</p>
    </footer>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('db_isaque_v11')) || [];
    let idioma = 'en';

    const trad = {
        en: { h: "Time Tracker", sub: "Isaque Edition", profile: "Profile & Company", n: "Name", c: "Company", r: "Rate (US$)", t_new: "New Shift", d: "Date", btn: "SAVE ENTRY", b1: "ENTRY", b2: "REPORT", mt: "Month Total", ot: "Overtime", earn: "Total Earnings", th1: "Date", th2: "Total", th3: "Pay" },
        pt: { h: "Controle de Ponto", sub: "Edição Isaque", profile: "Perfil e Empresa", n: "Nome", c: "Empresa", r: "Valor Hora", t_new: "Novo Lançamento", d: "Data", btn: "SALVAR PONTO", b1: "LANÇAR", b2: "RESUMO", mt: "Total do Mês", ot: "Hora Extra", earn: "Ganhos Totais", th1: "Data", th2: "Total", th3: "Ganho" },
        es: { h: "Control de Horas", sub: "Edición Isaque", profile: "Perfil y Empresa", n: "Nombre", c: "Empresa", r: "Precio Hora", t_new: "Nuevo Registro", d: "Fecha", btn: "GUARDAR", b1: "REGISTRO", b2: "REPORTE", mt: "Total Mes", ot: "Extra", earn: "Pago Total", th1: "Fecha", th2: "Total", th3: "Pago" }
    };

    function iniciarApp() {
        idioma = document.getElementById('langSet').value;
        const t = trad[idioma];
        document.getElementById('txt-h').innerText = t.h;
        document.getElementById('txt-sub').innerText = t.sub;
        document.getElementById('t-profile').innerText = t.profile;
        document.getElementById('l-name').innerText = t.n;
        document.getElementById('l-comp').innerText = t.c;
        document.getElementById('l-rate').innerText = t.r;
        document.getElementById('t-new').innerText = t.t_new;
        document.getElementById('l-date').innerText = t.d;
        document.getElementById('txt-btn').innerText = t.btn;
        document.getElementById('b1').innerText = t.b1;
        document.getElementById('b2').innerText = t.b2;
        document.getElementById('txt-mt').innerText = t.mt;
        document.getElementById('txt-ot').innerText = t.ot;
        document.getElementById('txt-earn').innerText = t.earn;
        document.getElementById('th1').innerText = t.th1;
        document.getElementById('th2').innerText = t.th2;
        document.getElementById('th3').innerText = t.th3;

        document.getElementById('splash').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('splash').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
        }, 500);
        desenharTabela();
    }

    function show(p) {
        document.querySelectorAll('.panel, .t-btn').forEach(el => el.classList.remove('active'));
        document.getElementById('p-'+p).classList.add('active');
        document.getElementById(p === 'lancar' ? 'b1' : 'b2').classList.add('active');
        if(p === 'resumo') {
            let m = db.reduce((a,b)=> a + b.m, 0);
            let ot = db.reduce((a,b)=> a + b.ot, 0);
            let g = db.reduce((a,b)=> a + b.g, 0);
            document.getElementById('vTotal').innerText = Math.floor(m/60) + "h " + (m%60) + "m";
            document.getElementById('vOT').innerText = Math.floor(ot/60) + "h " + (ot%60) + "m";
            document.getElementById('vPay').innerText = "US$ " + g.toFixed(2);
        }
    }

    const m = (t) => { if(!t) return 0; const [h,min] = t.split(':'); return parseInt(h)*60 + parseInt(min); };
    const mToH = (minutos) => Math.floor(minutos/60) + ":" + (minutos%60 < 10 ? '0' : '') + (minutos%60);

    function salvarPonto() {
        const d = document.getElementById('data').value, r = parseFloat(document.getElementById('uR').value) || 0;
        const t1 = document.getElementById('t1').value, t2 = document.getElementById('t2').value;
        const l1 = document.getElementById('l1').value, l2 = document.getElementById('l2').value;

        if(!d || !t1 || !t2) return alert("Error! Date and In/Out required.");
        
        let total = m(t2) - m(t1);
        if(l1 && l2) total -= (m(l2) - m(l1));
        if(total < 0) return alert("Time Error!");

        let obj = { id: Date.now(), d, m: total, ot: Math.max(0, total-480), g: (total/60)*r };
        db = db.filter(x => x.d !== d); db.push(obj);
        localStorage.setItem('db_isaque_v11', JSON.stringify(db));
        localStorage.setItem('u_n', document.getElementById('uN').value);
        localStorage.setItem('u_c', document.getElementById('uC').value);
        localStorage.setItem('u_r', r);
        desenharTabela(); alert("Saved!");
    }

    function desenharTabela() {
        let html = '';
        db.sort((a,b)=>b.d.localeCompare(a.d)).forEach(x => {
            html += `<tr><td>${x.d.split('-').reverse().join('/')}</td><td><b>${mToH(x.m)}</b></td><td>$${x.g.toFixed(2)}</td><td><button onclick="apagarRegistro(${x.id})" style="background:none; border:none; color:red;">❌</button></td></tr>`;
        });
        document.getElementById('listaPonto').innerHTML = html;
    }

    function apagarRegistro(id) { 
        if(confirm("Delete?")) {
            db = db.filter(x=>x.id!==id); 
            localStorage.setItem('db_isaque_v11', JSON.stringify(db)); 
            desenharTabela(); 
        }
    }

    function exportarExcel() {
        const nome = document.getElementById('uN').value || "User";
        const emp = document.getElementById('uC').value || "Company";
        const dados = db.sort((a,b)=>a.d.localeCompare(b.d)).map(x => ({
            "Colaborador": nome, "Empresa": emp, "Data": x.d, "Total Horas": mToH(x.m), "Overtime": mToH(x.ot), "Ganho (US$)": x.g.toFixed(2)
        }));
        const ws = XLSX.utils.json_to_sheet(dados);
        const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Timesheet");
        XLSX.writeFile(wb, `Timesheet_${nome}.xlsx`);
    }

    function exportarPDF() {
        const { jsPDF } = window.jspdf; 
        const doc = new jsPDF();
        const nome = document.getElementById('uN').value || "N/A";
        const emp = document.getElementById('uC').value || "N/A";
        const totalG = db.reduce((a,b)=> a+b.g, 0);

        // Header Background Profissional
        doc.setFillColor(30, 41, 59); doc.rect(0, 0, 210, 60, 'F');
        
        // Ícone no PDF
        const iconImg = document.getElementById('splash-icon');
        if (iconImg && iconImg.src.startsWith('data:')) {
            doc.addImage(iconImg.src, 'PNG', 160, 10, 35, 35);
        }

        // Título Invoice
        doc.setTextColor(255, 255, 255); doc.setFontSize(28); doc.text("INVOICE", 14, 25);
        
        doc.setFontSize(10); 
        doc.text(`Invoice No: ${Date.now().toString().slice(-6)}`, 14, 35);
        doc.text(`Date: ${new Date().toLocaleDateString()}`, 14, 40);

        // Seção TO / FROM
        doc.setFillColor(248, 250, 252); doc.rect(0, 60, 210, 40, 'F');
        doc.setTextColor(30, 41, 59);
        doc.setFontSize(12); doc.setFont(undefined, 'bold');
        doc.text("INVOICE TO:", 14, 75);
        doc.setFont(undefined, 'normal');
        doc.text(`${emp}`, 14, 82);
        
        doc.setFont(undefined, 'bold');
        doc.text("FROM:", 120, 75);
        doc.setFont(undefined, 'normal');
        doc.text(`${nome}`, 120, 82);

        // Caixa de Total Due (Destaque)
        doc.setFillColor(226, 232, 240); doc.rect(14, 90, 70, 10, 'F');
        doc.setFont(undefined, 'bold');
        doc.text(`TOTAL DUE: US$ ${totalG.toFixed(2)}`, 18, 97);

        // Tabela Principal Centralizada
        const rows = db.sort((a,b)=>a.d.localeCompare(b.d)).map(x=>[
            x.d.split('-').reverse().join('/'), 
            mToH(x.m), 
            mToH(x.ot), 
            "$ "+x.g.toFixed(2)
        ]);
        
        doc.autoTable({ 
            head: [['Date', 'Hours', 'Overtime', 'Amount']], 
            body: rows, 
            startY: 110, 
            theme: 'striped', 
            headStyles: {fillColor: [30, 41, 59], textColor: [255, 255, 255], halign: 'center'},
            columnStyles: { 0: {halign: 'left'}, 1: {halign: 'center'}, 2: {halign: 'center'}, 3: {halign: 'right'} },
            styles: { fontSize: 10, cellPadding: 5 }
        });
        
        // Sumário Final
        const finalY = doc.lastAutoTable.finalY + 10;
        doc.setFontSize(10); doc.setFont(undefined, 'normal');
        doc.text("Summary:", 140, finalY + 10);
        doc.text(`Sub Total:`, 140, finalY + 18); doc.text(`$ ${totalG.toFixed(2)}`, 193, finalY + 18, {align: 'right'});
        
        doc.setFillColor(30, 41, 59); doc.rect(140, finalY + 22, 55, 10, 'F');
        doc.setTextColor(255, 255, 255); doc.setFont(undefined, 'bold');
        doc.text(`GRAND TOTAL:`, 142, finalY + 28); doc.text(`$ ${totalG.toFixed(2)}`, 193, finalY + 28, {align: 'right'});

        // Área de Assinatura
        doc.setTextColor(30, 41, 59);
        doc.setDrawColor(200, 200, 200); doc.line(14, finalY + 50, 70, finalY + 50);
        doc.setFontSize(8); doc.text(nome, 14, finalY + 55);
        doc.text("Accounting Manager", 14, finalY + 59);

        doc.save(`Invoice_${nome}.pdf`);
    }

    window.onload = () => {
        document.getElementById('data').value = new Date().toISOString().split('T')[0];
        document.getElementById('uN').value = localStorage.getItem('u_n') || '';
        document.getElementById('uC').value = localStorage.getItem('u_c') || '';
        document.getElementById('uR').value = localStorage.getItem('u_r') || '';
        setInterval(()=> { document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }, 1000);
        
        const ins = document.querySelectorAll('.nav-in');
        ins.forEach((input, i) => {
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    if (i < ins.length - 1) ins[i + 1].focus();
                    else salvarPonto();
                }
            });
        });
    };
</script>
</body>
</html>
