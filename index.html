<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ponto Pro Platinum</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { --primary: #4f46e5; --ot: #f59e0b; --bg: #0f172a; --text: #1e293b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        
        /* Splash Screen */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; display: flex; align-items: center; justify-content: center;
            z-index: 9999; color: white; flex-direction: column;
        }
        .card-splash { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; text-align: center; width: 85%; max-width: 350px; }
        
        /* App */
        body { background: #f1f5f9; color: var(--text); display: none; padding: 15px; }
        header { background: #1e293b; color: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .card { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 15px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-top: 5px; font-size: 16px; }
        label { font-size: 11px; font-weight: bold; color: #64748b; text-transform: uppercase; }
        
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 10px; font-weight: bold; background: #e2e8f0; }
        .tab-btn.active { background: var(--primary); color: white; }
        
        .panel { display: none; }
        .panel.active { display: block; }
        
        button.main { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        td, th { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
        .ot { background: #fef3c7; color: #d97706; padding: 2px 5px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div id="splash">
    <div class="card-splash">
        <img src="icon.png" style="width:80px; border-radius:15px; margin-bottom:15px;">
        <h2 style="margin-bottom:20px;">Timesheet Pro</h2>
        <select id="langSet">
            <option value="en">English (US)</option>
            <option value="pt">Português (BR)</option>
            <option value="es">Español (ES)</option>
        </select>
        <button class="main" onclick="entrar()">START / INICIAR</button>
    </div>
</div>

<div class="container" id="app">
    <header>
        <div><b id="h1">Time Tracker</b><br><small>ISAQUE EDITION</small></div>
        <div id="clock" style="font-weight: bold;">00:00</div>
    </header>

    <div class="card">
        <label id="l1">Name & Company</label>
        <div class="grid">
            <input type="text" id="userName" placeholder="Name">
            <input type="text" id="userComp" placeholder="Company">
        </div>
        <label id="l2" style="margin-top:10px; display:block;">Hourly Rate (US$)</label>
        <input type="number" id="userRate" value="0">
    </div>

    <div class="tabs">
        <button id="bt1" class="tab-btn active" onclick="tab('lancar')">ENTRY</button>
        <button id="bt2" class="tab-btn" onclick="tab('resumo')">REPORT</button>
    </div>

    <div id="p-lancar" class="panel active">
        <div class="card">
            <label id="l3">Date</label>
            <input type="date" id="data">
            <div class="grid" style="margin-top:10px;">
                <div><label>IN</label><input type="time" id="tin"></div>
                <div><label>OUT</label><input type="time" id="tout"></div>
                <div><label>LUNCH IN</label><input type="time" id="lin"></div>
                <div><label>LUNCH OUT</label><input type="time" id="lout"></div>
            </div>
            <button class="main" id="btnS" onclick="save()">SAVE ENTRY</button>
        </div>
        <div class="card" style="overflow-x:auto;">
            <table>
                <thead><tr><th id="th1">Date</th><th id="th2">Total</th><th id="th3">Pay</th><th></th></tr></thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
    </div>

    <div id="p-resumo" class="panel">
        <div class="grid">
            <div class="card"><small id="l4">MONTH TOTAL</small><div id="v1" style="font-size:1.5rem; font-weight:900;">00:00</div></div>
            <div class="card" style="border-left:4px solid var(--ot);"><small id="l5">OVERTIME</small><div id="v2" style="font-size:1.5rem; font-weight:900; color:var(--ot);">00:00</div></div>
        </div>
        <div class="card"><small id="l6">EARNINGS</small><div id="v3" style="font-size:1.5rem; font-weight:900; color:green;">$ 0.00</div></div>
        <div class="grid">
            <button class="main" style="background:#10b981;" onclick="doExcel()">EXCEL</button>
            <button class="main" style="background:#ef4444;" onclick="doPDF()">PDF</button>
        </div>
    </div>

    <footer style="text-align:center; padding:20px; font-size:10px; color:#94a3b8; font-weight:bold;">
        MADE BY ISAQUE / FEITO POR ISAQUE
    </footer>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('db_isaque_v8')) || [];
    let lang = 'en';

    const texts = {
        en: { h1: "Time Tracker", l1: "Name & Company", l2: "Hourly Rate (US$)", l3: "Date", l4: "MONTH TOTAL", l5: "OVERTIME", l6: "EARNINGS", btnS: "SAVE ENTRY", bt1: "ENTRY", bt2: "REPORT", th1: "Date", th2: "Total", th3: "Pay" },
        pt: { h1: "Controle de Ponto", l1: "Nome e Empresa", l2: "Valor da Hora (US$)", l3: "Data", l4: "TOTAL DO MÊS", l5: "HORA EXTRA", l6: "GANHOS", btnS: "SALVAR PONTO", bt1: "LANÇAR", bt2: "RESUMO", th1: "Data", th2: "Total", th3: "Ganho" },
        es: { h1: "Control de Horas", l1: "Nombre y Empresa", l2: "Precio Hora (US$)", l3: "Fecha", l4: "TOTAL MES", l5: "EXTRAS", l6: "PAGO", btnS: "GUARDAR", bt1: "REGISTRO", bt2: "REPORTE", th1: "Fecha", th2: "Total", th3: "Pago" }
    };

    function entrar() {
        lang = document.getElementById('langSet').value;
        const t = texts[lang];
        for(let id in t) { if(document.getElementById(id)) document.getElementById(id).innerText = t[id]; }
        document.getElementById('splash').style.display = 'none';
        document.body.style.display = 'block';
        render();
    }

    function tab(p) {
        document.querySelectorAll('.panel, .tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById('p-'+p).classList.add('active');
        document.getElementById(p === 'lancar' ? 'bt1' : 'bt2').classList.add('active');
        if(p === 'resumo') {
            let m = db.reduce((a,b)=>a+b.m, 0);
            let ot = db.reduce((a,b)=>a+b.ot, 0);
            let $ = db.reduce((a,b)=>a+b.g, 0);
            document.getElementById('v1').innerText = Math.floor(m/60)+":"+(m%60<10?'0':'')+m%60;
            document.getElementById('v2').innerText = Math.floor(ot/60)+":"+(ot%60<10?'0':'')+ot%60;
            document.getElementById('v3').innerText = "US$ " + $.toFixed(2);
        }
    }

    function save() {
        const d = document.getElementById('data').value;
        const r = parseFloat(document.getElementById('userRate').value) || 0;
        const t1 = document.getElementById('tin').value, t2 = document.getElementById('tout').value;
        const l1 = document.getElementById('lin').value, l2 = document.getElementById('lout').value;
        
        if(!d || !t1 || !t2) return alert("Fill In/Out/Date!");
        
        const m1 = (h,m) => parseInt(h)*60 + parseInt(m);
        const calc = (s, e) => m1(...e.split(':')) - m1(...s.split(':'));
        
        let total = calc(t1, t2) - (l1 && l2 ? calc(l1, l2) : 0);
        if(total < 0) return alert("Time Error!");

        let obj = { id: Date.now(), d, m: total, ot: Math.max(0, total-480), g: (total/60)*r };
        db = db.filter(x => x.d !== d); db.push(obj);
        localStorage.setItem('db_isaque_v8', JSON.stringify(db));
        localStorage.setItem('u_n', document.getElementById('userName').value);
        localStorage.setItem('u_c', document.getElementById('userComp').value);
        localStorage.setItem('u_r', r);
        render(); alert("Saved!");
    }

    function render() {
        let h = '';
        db.sort((a,b)=>b.d.localeCompare(a.d)).forEach(r => {
            h += `<tr><td>${r.d}</td><td>${Math.floor(r.m/60)}h${r.m%60}</td><td>$${r.g.toFixed(2)}</td><td><button onclick="del(${r.id})" style="background:none;border:none;">❌</button></td></tr>`;
        });
        document.getElementById('tbody').innerHTML = h;
    }

    function del(id) { db = db.filter(x=>x.id!==id); localStorage.setItem('db_isaque_v8', JSON.stringify(db)); render(); }

    function doExcel() {
        let ws = XLSX.utils.json_to_sheet(db);
        let wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Ponto");
        XLSX.writeFile(wb, "Ponto_Isaque.xlsx");
    }

    function doPDF() {
        const { jsPDF } = window.jspdf; let doc = new jsPDF();
        doc.text("Timesheet Report - Isaque", 10, 10);
        doc.autoTable({ head: [['Date', 'Min', 'Pay']], body: db.map(x=>[x.d, x.m, x.g.toFixed(2)]) });
        doc.save("Report.pdf");
    }

    window.onload = () => {
        document.getElementById('data').value = new Date().toISOString().split('T')[0];
        document.getElementById('userName').value = localStorage.getItem('u_n') || '';
        document.getElementById('userComp').value = localStorage.getItem('u_c') || '';
        document.getElementById('userRate').value = localStorage.getItem('u_r') || 0;
        setInterval(()=> { document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }, 1000);
    };
</script>
</body>
</html>
