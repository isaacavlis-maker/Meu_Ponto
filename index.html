<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Controle de Ponto Platinum V18</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { --p: #1e293b; --accent: #4f46e5; --bg: #f1f5f9; --text: #1e293b; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 50px; }
        
        #splash { position:fixed; top:0; left:0; width:100%; height:100%; background: #1e293b; display:flex; align-items:center; justify-content:center; z-index:9999; color:white; flex-direction:column; }
        .splash-card { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 25px; text-align: center; width: 85%; max-width: 350px; border: 1px solid rgba(255,255,255,0.1); }
        
        header { background:#1e293b; color:white; padding:20px; border-radius:0 0 20px 20px; display:flex; justify-content:space-between; align-items: center; }
        .card { background:white; border-radius:20px; padding:20px; box-shadow:0 4px 6px rgba(0,0,0,0.05); margin-bottom:15px; }
        .grid { display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
        .full { grid-column: span 2; }
        label { font-size: 0.65rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px; display: block; }
        input, select, textarea { width:100%; padding:12px; border:2px solid #e2e8f0; border-radius:12px; font-size:1rem; outline: none; }
        
        .tabs { display:flex; gap:8px; background:#e2e8f0; padding:5px; border-radius:15px; margin-bottom:20px; }
        .t-btn { flex:1; padding:12px; border:none; border-radius:10px; background:transparent; font-weight:bold; color: #64748b; }
        .t-btn.active { background:white; color:var(--accent); }
        
        .panel { display:none; } .panel.active { display:block; }
        button.btn-main { background:var(--accent); color:white; border:none; padding:15px; border-radius:12px; width:100%; font-weight:bold; cursor:pointer; }
        
        #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; padding:20px; overflow-y:auto; }
        .modal-content { background:white; border-radius:25px; padding:25px; max-width:500px; margin:auto; }
        
        table { width:100%; border-collapse:collapse; }
        th { text-align:left; padding:10px; font-size:0.65rem; color:#94a3b8; border-bottom: 2px solid #f1f5f9; }
        td { padding:10px; border-bottom: 1px solid #f1f5f9; font-size:0.85rem; }

        /* KPI Grid para Relatório */
        .kpi-grid { display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px;}
        .kpi-box { padding: 15px; background: #f8fafc; border-radius: 12px; text-align: center;}
        .kpi-val { font-size: 1.1rem; font-weight: bold;}

        .powered-by { text-align:center; font-size:8px; color:#94a3b8; margin-top:20px; font-weight:bold; text-transform:uppercase; letter-spacing: 1px;}
    </style>
</head>
<body>

<div id="splash">
    <div class="splash-card">
        <h2 style="margin-bottom:10px;">HORAS CONTROLE</h2>
        <p style="font-size:0.8rem; margin:10px 0 20px; opacity:0.7;">Platinum Invoice System</p>
        <button class="btn-main" onclick="iniciarApp()">ENTRAR</button>
        <div class="powered-by" style="color:white; opacity:0.5;">Developed & Powered By: Isaqueavlis</div>
    </div>
</div>

<div id="app-content" style="display:none; padding:15px;">
    <header>
        <div><b>Meus Pontos</b><br><small>Platinum V18</small></div>
        <button onclick="toggleModal(true)" style="background:none; border:none; color:white; font-size:20px;">⚙️</button>
    </header>

    <div class="card" style="margin-top:15px;">
        <div class="grid">
            <div class="full"><label>Seu Nome (FROM)</label><input type="text" id="uN" class="nav-f"></div>
            <div><label>Empresa (TO)</label><input type="text" id="uC" class="nav-f"></div>
            <div><label>Taxa/Hora ($)</label><input type="number" id="uR" class="nav-f"></div>
        </div>
    </div>

    <nav class="tabs">
        <button id="b1" class="t-btn active" onclick="show('lancar')">LANÇAR</button>
        <button id="b2" class="t-btn" onclick="show('resumo')">RELATÓRIO</button>
    </nav>

    <div id="p-lancar" class="panel active">
        <div class="card">
            <div class="grid">
                <div class="full"><label>Data</label><input type="date" id="data" class="nav-f"></div>
                <div><label>Entrada</label><input type="time" id="t1" class="nav-f"></div>
                <div><label>Almoço IN</label><input type="time" id="l1" class="nav-f"></div>
                <div><label>Almoço OUT</label><input type="time" id="l2" class="nav-f"></div>
                <div><label>Saída</label><input type="time" id="t2" class="nav-f"></div>
            </div>
            <button class="btn-main" style="margin-top:20px;" onclick="salvarPonto()">SALVAR DIA</button>
        </div>
        <div class="card" style="overflow-x:auto;">
            <table><thead><tr><th>Data</th><th>Total</th><th>Pagamento</th><th></th></tr></thead><tbody id="listaPonto"></tbody></table>
        </div>
        <div class="powered-by">Developed & Powered By: Isaqueavlis</div>
    </div>

    <div id="p-resumo" class="panel">
        <div class="kpi-grid">
            <div class="kpi-box"><label>Semanal</label><div id="sumWeek" class="kpi-val">00:00</div></div>
            <div class="kpi-box"><label>Mensal</label><div id="sumMonth" class="kpi-val">00:00</div></div>
        </div>

        <div class="card" style="border-left:4px solid var(--accent);">
            <label>TOTAL GERAL</label><h2 id="vTotal" style="color:var(--accent); font-size:2.2rem;">00:00</h2>
        </div>
        <div class="card" style="border-left:4px solid var(--ot); margin-top:10px;">
            <label>TOTAL OVERTIME</label><h2 id="vOT" style="color:var(--ot);">00:00</h2>
        </div>
        <div class="card" style="border-left:4px solid var(--success); margin-top:10px;">
            <label>TOTAL A RECEBER</label><h2 id="vPay" style="color:var(--success); font-size:2rem;">$ 0.00</h2>
        </div>
        <div class="grid">
            <button class="btn-main" style="background:#10b981;" onclick="exportarExcel()">📊 EXCEL</button>
            <button class="btn-main" style="background:#ef4444;" onclick="exportarPDF()">📄 GERAR INVOICE</button>
        </div>
        <div class="powered-by">Developed & Powered By: Isaqueavlis</div>
    </div>
</div>

<div id="modal">
    <div class="modal-content">
        <h3>⚙️ Configurações</h3>
        <label>Logo (Subir Arquivo)</label><input type="file" id="logoUpload" accept="image/*">
        <label>Seu Endereço (FROM)</label><textarea id="uAddr" rows="2"></textarea>
        <label>Endereço da Empresa (TO)</label><textarea id="cAddr" rows="2"></textarea>
        <div class="grid">
            <div class="full"><label>Banco</label><input type="text" id="bName"></div>
            <div><label>Conta</label><input type="text" id="bAcc"></div>
            <div><label>Zelle/PayPal</label><input type="text" id="bPaypal"></div>
            <div class="full"><label>Nº Próxima Invoice</label><input type="number" id="iNext"></div>
        </div>
        <button class="btn-main" style="margin-top:20px;" onclick="toggleModal(false)">SALVAR E VOLTAR</button>
        <div class="powered-by">Developed & Powered By: Isaqueavlis</div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('db_isaque_v18')) || [];
    let base64Logo = localStorage.getItem('isq_logo_b64_v18') || "";

    document.getElementById('logoUpload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onloadend = () => { base64Logo = reader.result; localStorage.setItem('isq_logo_b64_v18', base64Logo); };
        if(file) reader.readAsDataURL(file);
    });

    function iniciarApp() {
        document.getElementById('splash').style.display = 'none';
        document.getElementById('app-content').style.display = 'block';
        desenharTabela();
    }

    function toggleModal(s) {
        document.getElementById('modal').style.display = s ? 'block' : 'none';
        if(!s) {
            localStorage.setItem('u_addr', document.getElementById('uAddr').value);
            localStorage.setItem('c_addr', document.getElementById('cAddr').value);
            localStorage.setItem('b_name', document.getElementById('bName').value);
            localStorage.setItem('b_acc', document.getElementById('bAcc').value);
            localStorage.setItem('b_paypal', document.getElementById('bPaypal').value);
            localStorage.setItem('inv_num', document.getElementById('iNext').value);
        }
    }

    function show(p) {
        document.querySelectorAll('.panel, .t-btn').forEach(el => el.classList.remove('active'));
        document.getElementById('p-'+p).classList.add('active');
        document.getElementById(p === 'lancar' ? 'b1' : 'b2').classList.add('active');
        if(p === 'resumo') atualizarResumos();
    }

    const m = (t) => { if(!t) return 0; const [h,min] = t.split(':'); return parseInt(h)*60 + parseInt(min); };
    const mToH = (minutos) => Math.floor(minutos/60) + "h " + (minutos%60 < 10 ? '0':'') + (minutos%60);

    function salvarPonto() {
        const d = document.getElementById('data').value, r = parseFloat(document.getElementById('uR').value) || 0;
        const total = (m(document.getElementById('t2').value) - m(document.getElementById('t1').value)) - (m(document.getElementById('l2').value) - m(document.getElementById('l1').value));
        if(isNaN(total) || total <= 0) return alert("Horários inválidos!");
        let obj = { id: Date.now(), d, m: total, ot: Math.max(0, total-480), g: (total/60)*r };
        db = db.filter(x => x.d !== d); db.push(obj);
        localStorage.setItem('db_isaque_v18', JSON.stringify(db));
        localStorage.setItem('u_n', document.getElementById('uN').value);
        localStorage.setItem('u_c', document.getElementById('uC').value);
        localStorage.setItem('u_r', r);
        desenharTabela(); alert("Salvo!");
    }

    function desenharTabela() {
        let h = '';
        db.sort((a,b)=>b.d.localeCompare(a.d)).forEach(x => {
            h += `<tr><td>${x.d.split('-').reverse().join('/')}</td><td><b>${mToH(x.m)}</b></td><td>$${x.g.toFixed(2)}</td><td><button onclick="del(${x.id})" style="border:none;background:none">❌</button></td></tr>`;
        });
        document.getElementById('listaPonto').innerHTML = h;
    }

    function apagarRegistro(id) { if(confirm("Apagar?")) { db = db.filter(x=>x.id!==id); localStorage.setItem('db_isaque_v18', JSON.stringify(db)); desenharTabela(); } }

    function atualizarResumos() {
        let totalM = db.reduce((a,b)=> a+b.m, 0);
        let totalOT = db.reduce((a,b)=> a+b.ot, 0);
        let totalG = db.reduce((a,b)=> a+b.g, 0);
        
        document.getElementById('vTotal').innerText = mToH(totalM);
        document.getElementById('vOT').innerText = mToH(totalOT);
        document.getElementById('vPay').innerText = "$ " + totalG.toFixed(2);
        
        // Simulação semanal/mensal (somando tudo para placeholder)
        document.getElementById('sumWeek').innerText = mToH(totalM);
        document.getElementById('sumMonth').innerText = mToH(totalM);
    }

    function exportarExcel() {
        const ws = XLSX.utils.json_to_sheet(db.map(x=>({Data:x.d,Minutos:x.m,Overtime:x.ot,Ganho:x.g})));
        const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
        XLSX.writeFile(wb, "Ponto_Isaque.xlsx");
    }

    function exportarPDF() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        const n = document.getElementById('uN').value, c = document.getElementById('uC').value;
        const totalG = db.reduce((a,b)=> a+b.g, 0);
        const inv = localStorage.getItem('inv_num') || 1;

        doc.setFillColor(30,41,59); doc.rect(0,0,210,50,'F');
        if(base64Logo) try { doc.addImage(base64Logo, 'PNG', 155, 5, 40, 40); } catch(e) {}
        
        doc.setTextColor(255); doc.setFontSize(28); doc.setFont(undefined, 'bold');
        doc.text("INVOICE", 14, 25);
        doc.setFontSize(10); doc.setFont(undefined, 'normal');
        doc.text(`Invoice No: #${inv}`, 14, 35);
        doc.text(`Date: ${new Date().toLocaleDateString()}`, 14, 40);

        // Seção FROM / TO Invertida - "INVOICE TO:" na Esquerda
        doc.setTextColor(30); doc.setFontSize(10);
        doc.setFont(undefined, 'bold'); doc.text("INVOICE TO:", 14, 65);
        doc.setFont(undefined, 'normal'); doc.text(`${c}\n${document.getElementById('cAddr').value}`, 14, 71);

        doc.setFont(undefined, 'bold'); doc.text("FROM:", 120, 65);
        doc.setFont(undefined, 'normal'); doc.text(`${n}\n${document.getElementById('uAddr').value}`, 120, 71);

        doc.setFillColor(235); doc.rect(14,90,65,12,'F');
        doc.setFont(undefined,'bold'); doc.text(`Due Total: $ ${totalG.toFixed(2)}`, 18,97);

        doc.autoTable({
            head: [['Date','Reg. Hours','Overtime','Daily Total']],
            body: db.sort((a,b)=>b.d.localeCompare(a.d)).map(x=>[x.d, mToH(x.m), mToH(x.ot), "$ "+x.g.toFixed(2)]),
            startY:110, theme: 'striped', headStyles: {fillColor:[30,41,59]}
        });

        // Fim da Folha - Assinatura e Powered By
        const finalY = doc.lastAutoTable.finalY + 30;
        doc.setDrawColor(200); doc.line(130, finalY, 190, finalY);
        doc.setFontSize(10); doc.text("Accounting Manager", 135, finalY + 7);
        doc.setFontSize(8); doc.setTextColor(150); doc.text("Developed & Powered By: Isaqueavlis", 80, 285);

        doc.save(`Invoice_${n}_${inv}.pdf`);
        localStorage.setItem('inv_num', parseInt(inv)+1);
    }

    window.onload = () => {
        document.getElementById('data').value = new Date().toISOString().split('T')[0];
        document.getElementById('uN').value = localStorage.getItem('u_n') || '';
        document.getElementById('uC').value = localStorage.getItem('u_c') || '';
        document.getElementById('uR').value = localStorage.getItem('u_r') || '';
        document.getElementById('uAddr').value = localStorage.getItem('u_addr') || '';
        document.getElementById('cAddr').value = localStorage.getItem('c_addr') || '';
        document.getElementById('bName').value = localStorage.getItem('b_name') || '';
        document.getElementById('bAcc').value = localStorage.getItem('b_acc') || '';
        document.getElementById('bPaypal').value = localStorage.getItem('b_paypal') || '';
        document.getElementById('iNext').value = localStorage.getItem('inv_num') || 1;
        
        const inputs = document.querySelectorAll('.nav-f');
        inputs.forEach((inp, i) => {
            inp.addEventListener('keydown', e => {
                if(e.key === 'Enter') {
                    e.preventDefault();
                    if(i < inputs.length - 1) inputs[i+1].focus();
                    else salvarPonto();
                }
            });
        });
    };
</script>
</body>
</html>
